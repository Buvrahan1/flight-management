name: SkySync CI/CD Pilot # Uçuş planının adı

on:
  push:
    branches: [ "main" ] # Sadece "main" branch'ine bir şey gönderirsek çalış

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Robotun kullanacağı işletim sistemi (Pistimiz)

    steps:
      # 1. Kodları GitHub'dan çek
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Java 21 ortamını hazırla
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven # Hızlanmak için kütüphaneleri hafızaya al

      # 3. Maven ile uygulamayı paketle (JAR oluştur)
      - name: Build with Maven
        run: mvn clean package -DskipTests # Hatırlarsın, testleri atlamamız gerekiyordu

      # 4. Docker Hub'a giriş yap (Az önce oluşturduğumuz kasadan alacak)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Docker imajını oluştur ve gönder (Push)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # BURAYI GÜNCELLE: kullanıcı_adin/proje_adin
          tags: ${{ secrets.DOCKER_USERNAME }}/flight-management-service:latest