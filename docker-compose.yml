services:
  db:
    image: postgres:15
    container_name: skysync_db
    environment:
      POSTGRES_USER: bugrahan
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: skysyncdb
    ports:
      - "5432:5432"
  app:
    build: . # Dockerfile burada demek
    image: buvrahan1/flight-management-service:latest
    container_name: skysync_app
    ports:
      - "8080:8080"
    depends_on:
      - db # Önce veritabanı açılsın demek
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/skysyncdb

  watchtower:
    image: containrrr/watchtower
    container_name: skysync_watchtower
    environment:
      - DOCKER_API_VERSION=1.44 # Docker'a "Bu dilden konuş" diyoruz
      - REPO_USER=${MY_DOCKER_USER}
      - REPO_PASS=${MY_DOCKER_PASS} # Veya Access Token
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 --cleanup
    restart: always

  prometheus:
    image: prom/prometheus
    container_name: skysync_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml # Ayar dosyasını bağlıyoruz
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: skysync_grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus